<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gregório's Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #eef2f3; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .card2 { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #6e5494; }
        button { width: 100%; background: #6e5494; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4180b0; transform: translateY(-2px); }
        .lista { margin-top: 30px; width: 100%; max-width: 400px; }
        .item-lista { background: white; margin-bottom: 10px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 5px solid #6e5494; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="card2">
        <h2> Procurando algo em específico?</h2>
        <p>Projetos imbutidos nesse mesmo app.js:</p>
        <a href="/comprar">"Sistema de logs"</a>
        <br>
        <a href="/enviar">"Formulário com confirmação web" </a>
    </div>

    <br>

    <div class="card">
        <h2>Lista de Desejos!</h2>
        <form action="/adicionar" method="POST">
            <input type="text" name="item" placeholder="Nome do desejo" required>
            <input type="number" step="0.01" name="preco" placeholder="Preço Estimado (R$)" required>
            <button type="submit">Adicionar à Lista</button>
        </form>
    </div>

    <div class="lista" id="listaDesejos">
        </div>

    <script>
        // Busca os dados da API e renderiza na tela
        async function carregarDesejos() {
            const res = await fetch('/api/desejos');
            const dados = await res.json();
            const container = document.getElementById('listaDesejos');
            
            container.innerHTML = dados.map(d => `
                <div class="item-lista">
                    <strong>${d.item}</strong>
                    <span>R$ ${d.preco.toFixed(2)}</span>
                </div>
            `).join('');
        }
        carregarDesejos();
    </script>
</body>
</html>
